<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PsicoApp – Agenda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --verde: #2ecc71;
      --verde-oscuro: #27ae60;
      --naranja: #f39c12;
      --azul: #3498db;
      --violeta: #8e44ad;
      --rojo: #e74c3c;
      --gris-fondo: #f4f6f9;
      --gris-texto: #6c757d;
      --texto: #2d3748;
      --blanco: #ffffff;
      --sombra: 0 2px 12px rgba(0,0,0,0.08);
      --radio: 14px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gris-fondo);
      color: var(--texto);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    .header {
      background: var(--blanco);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eef0f3;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--texto);
    }
    .btn-agregar {
      background: var(--verde-oscuro);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── SELECTOR DE SEMANA ── */
    .semana-nav {
      background: var(--blanco);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #eef0f3;
    }
    .semana-nav button {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--gris-texto);
      padding: 4px 8px;
    }
    .semana-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--texto);
    }

    /* ── DÍAS SCROLL ── */
    .dias-scroll {
      background: var(--blanco);
      padding: 10px 16px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      border-bottom: 1px solid #eef0f3;
      -webkit-overflow-scrolling: touch;
    }
    .dias-scroll::-webkit-scrollbar { display: none; }
    .dia-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 46px;
      padding: 8px 4px;
      border-radius: 12px;
      cursor: pointer;
      border: none;
      background: none;
      transition: background 0.15s;
    }
    .dia-chip.seleccionado {
      background: var(--verde-oscuro);
    }
    .dia-chip.hoy .dia-num { color: var(--verde-oscuro); }
    .dia-chip.seleccionado .dia-nombre,
    .dia-chip.seleccionado .dia-num { color: white; }
    .dia-nombre {
      font-size: 11px;
      font-weight: 600;
      color: var(--gris-texto);
      text-transform: uppercase;
    }
    .dia-num {
      font-size: 20px;
      font-weight: 800;
      color: var(--texto);
      line-height: 1.1;
    }
    .dia-punto {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--naranja);
      margin-top: 3px;
      visibility: hidden;
    }
    .dia-chip.tiene-turnos .dia-punto { visibility: visible; }
    .dia-chip.seleccionado .dia-punto { background: rgba(255,255,255,0.7); }

    /* ── CONTENIDO ── */
    .contenido {
      padding: 16px;
    }
    .dia-titulo {
      font-size: 14px;
      font-weight: 700;
      color: var(--gris-texto);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }

    /* ── TURNO CARD ── */
    .turno-card {
      background: var(--blanco);
      border-radius: var(--radio);
      padding: 14px 16px;
      box-shadow: var(--sombra);
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: box-shadow 0.2s, transform 0.1s;
    }
    .turno-card:active { transform: scale(0.99); }
    .turno-borde {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: var(--radio) 0 0 var(--radio);
    }
    .borde-verde { background: var(--verde-oscuro); }
    .borde-naranja { background: var(--naranja); }
    .borde-azul { background: var(--azul); }
    .borde-violeta { background: var(--violeta); }
    .borde-rojo { background: var(--rojo); }

    .turno-hora-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 52px;
      padding-left: 6px;
    }
    .turno-hora {
      font-size: 17px;
      font-weight: 800;
      color: var(--texto);
    }
    .turno-dur {
      font-size: 11px;
      color: var(--gris-texto);
    }
    .turno-info { flex: 1; }
    .turno-paciente {
      font-size: 15px;
      font-weight: 700;
      color: var(--texto);
      margin-bottom: 2px;
    }
    .turno-tipo {
      font-size: 12px;
      color: var(--gris-texto);
    }
    .turno-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .badge-estado {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }
    .est-pendiente { background: #fff3cd; color: #856404; }
    .est-realizado { background: #d4edda; color: #155724; }
    .est-cancelado { background: #f8d7da; color: #721c24; }

    /* ── BTN FLOATING ── */
    .fab {
      position: fixed;
      bottom: 88px;
      right: 20px;
      background: var(--verde-oscuro);
      color: white;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(39,174,96,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 40;
      transition: transform 0.15s;
    }
    .fab:active { transform: scale(0.92); }

    /* ── EMPTY ── */
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gris-texto);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-txt { font-size: 14px; margin-bottom: 16px; }
    .empty-btn {
      background: var(--verde-oscuro);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--blanco);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 40px; height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .modal-titulo {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--texto);
    }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--gris-texto);
      margin-bottom: 6px;
    }
    .form-group select,
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      font-size: 15px;
      background: var(--blanco);
      color: var(--texto);
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group select:focus,
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--verde); }

    .colores-fila {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .color-opcion {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-opcion.activo { border-color: var(--texto); transform: scale(1.15); }

    .btn-fila {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn-cancel {
      flex: 1;
      padding: 14px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: var(--gris-texto);
    }
    .btn-guardar {
      flex: 2;
      padding: 14px;
      background: var(--verde-oscuro);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── MODAL DETALLE ── */
    .modal-detalle-acciones {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-accion {
      padding: 13px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-realizado { background: #d4edda; color: #155724; }
    .btn-cancelar-turno { background: #f8d7da; color: #721c24; }
    .btn-editar { background: #e3f2fd; color: #1565c0; }
    .btn-eliminar { background: #fce4ec; color: #b71c1c; }
    .btn-whatsapp { background: #e8f5e9; color: #2e7d32; }

    /* ── MINI MODAL NUEVO PACIENTE ── */
    .mini-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: flex-end;
    }
    .mini-modal-overlay.open { display: flex; }
    .mini-modal {
      background: var(--blanco);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      width: 100%;
    }
    .mini-modal-titulo {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
    }

    /* ── NAV BOTTOM ── */
    .nav-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--blanco);
      border-top: 1px solid #eef0f3;
      display: flex;
      z-index: 90;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px 8px;
      text-decoration: none;
      color: var(--gris-texto);
      font-size: 10px;
      font-weight: 500;
      gap: 3px;
      border: none;
      background: none;
      cursor: pointer;
    }
    .nav-item.activo { color: var(--verde-oscuro); }
    .nav-icon { font-size: 22px; }

    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--blanco);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .drawer.open { transform: translateY(0); }
    .drawer-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 20px; }
    .drawer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .drawer-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 14px 6px; border-radius: 12px; text-decoration: none;
      color: var(--texto); background: var(--gris-fondo);
    }
    .drawer-icon { font-size: 28px; }
    .drawer-label { font-size: 12px; font-weight: 600; }

    .loading { text-align: center; padding: 40px; color: var(--gris-texto); font-size: 14px; }

    /* Línea de tiempo */
    .timeline-linea {
      position: absolute;
      left: 66px;
      top: 0; bottom: 0;
      width: 1px;
      background: #eef0f3;
      z-index: 0;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-title">📅 Agenda</div>
  <button class="btn-agregar" onclick="abrirModalNuevo()">
    + Nuevo turno
  </button>
</header>

<!-- SEMANA NAV -->
<div class="semana-nav">
  <button onclick="cambiarSemana(-1)">‹</button>
  <div class="semana-label" id="semana-label">Esta semana</div>
  <button onclick="cambiarSemana(1)">›</button>
</div>

<!-- DÍAS SCROLL -->
<div class="dias-scroll" id="dias-scroll">
  <!-- generado por JS -->
</div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">
  <div class="loading">Cargando turnos…</div>
</div>

<!-- FAB -->
<button class="fab" onclick="abrirModalNuevo()">+</button>

<!-- NAV BOTTOM -->
<nav class="nav-bottom">
  <a class="nav-item" href="psicoapp-index.html"><span class="nav-icon">🏠</span>Inicio</a>
  <a class="nav-item activo" href="psicoapp-agenda.html"><span class="nav-icon">📅</span>Agenda</a>
  <a class="nav-item" href="psicoapp-pacientes.html"><span class="nav-icon">👥</span>Pacientes</a>

  <button class="nav-item" onclick="abrirDrawer()"><span class="nav-icon">☰</span>Más</button>
</nav>

<!-- DRAWER -->
<div class="drawer-overlay" id="drawer-overlay" onclick="cerrarDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-grid">
    <a href="psicoapp-pagos.html" class="drawer-item"><span class="drawer-icon">💰</span><span class="drawer-label">Pagos</span></a>
    <a href="psicoapp-pericias.html" class="drawer-item"><span class="drawer-icon">📋</span><span class="drawer-label">Pericias</span></a>
    <a href="psicoapp-perfil.html" class="drawer-item"><span class="drawer-icon">👤</span><span class="drawer-label">Perfil</span></a>
    <a href="psicoapp-cuenta.html" class="drawer-item"><span class="drawer-icon">⚙️</span><span class="drawer-label">Cuenta</span></a>
  </div>
</div>

<!-- MODAL NUEVO/EDITAR TURNO -->
<div class="modal-overlay" id="modal-turno">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-titulo" id="modal-titulo-txt">Nuevo turno</div>

    <div class="form-group">
      <label>
        👤 Paciente
        <button onclick="abrirMiniModal()" style="background:var(--verde);color:white;border:none;border-radius:50px;padding:4px 10px;font-size:12px;font-weight:600;cursor:pointer;">+ Nuevo</button>
      </label>
      <select id="input-paciente">
        <option value="">Cargando pacientes…</option>
      </select>
    </div>

    <div class="form-group">
      <label>📋 Tipo</label>
      <select id="input-tipo" onchange="actualizarColorPorTipo()">
        <option value="Sesión">Sesión</option>
        <option value="Evaluación">Evaluación</option>
        <option value="Pericia">Pericia</option>
        <option value="Evento">Evento</option>
        <option value="Otro">Otro</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label>📅 Fecha</label>
        <input type="date" id="input-fecha">
      </div>
      <div class="form-group">
        <label>🕐 Hora</label>
        <input type="time" id="input-hora">
      </div>
    </div>

    <div class="form-group">
      <label>⏱ Duración</label>
      <select id="input-duracion">
        <option value="30">30 min</option>
        <option value="45" selected>45 min</option>
        <option value="50">50 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
      </select>
    </div>

    <div class="form-group">
      <label>🎨 Color</label>
      <div class="colores-fila" id="colores-fila">
        <div class="color-opcion activo" style="background:#27ae60" data-color="#27ae60" onclick="seleccionarColor(this)"></div>
        <div class="color-opcion" style="background:#f39c12" data-color="#f39c12" onclick="seleccionarColor(this)"></div>
        <div class="color-opcion" style="background:#3498db" data-color="#3498db" onclick="seleccionarColor(this)"></div>
        <div class="color-opcion" style="background:#8e44ad" data-color="#8e44ad" onclick="seleccionarColor(this)"></div>
        <div class="color-opcion" style="background:#e74c3c" data-color="#e74c3c" onclick="seleccionarColor(this)"></div>
        <div class="color-opcion" style="background:#1abc9c" data-color="#1abc9c" onclick="seleccionarColor(this)"></div>
      </div>
    </div>

    <div class="form-group">
      <label>💬 Notas (opcional)</label>
      <textarea id="input-notas" rows="2" placeholder="Motivo, recordatorio…"></textarea>
    </div>

    <div class="form-group" style="display:flex;align-items:center;gap:10px">
      <input type="checkbox" id="input-whatsapp" style="width:20px;height:20px;accent-color:var(--verde)">
      <label for="input-whatsapp" style="font-size:14px;color:var(--texto);font-weight:500">Enviar recordatorio WhatsApp</label>
    </div>

    <div class="btn-fila">
      <button class="btn-cancel" onclick="cerrarModal('modal-turno')">Cancelar</button>
      <button class="btn-guardar" onclick="guardarTurno()">✓ Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal-overlay" id="modal-detalle">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detalle-contenido"></div>
    <div class="modal-detalle-acciones" id="detalle-acciones"></div>
    <div style="margin-top:10px">
      <button class="btn-cancel" style="width:100%" onclick="cerrarModal('modal-detalle')">Cerrar</button>
    </div>
  </div>
</div>

<!-- MINI MODAL NUEVO PACIENTE -->
<div class="mini-modal-overlay" id="mini-modal">
  <div class="mini-modal">
    <div class="mini-modal-titulo">➕ Nuevo paciente rápido</div>
    <div class="form-group">
      <label>Nombre</label>
      <input type="text" id="mini-nombre" placeholder="Juan">
    </div>
    <div class="form-group">
      <label>Apellido</label>
      <input type="text" id="mini-apellido" placeholder="García">
    </div>
    <div class="form-group">
      <label>Teléfono (opcional)</label>
      <input type="tel" id="mini-telefono" placeholder="+54 11 1234-5678">
    </div>
    <div class="btn-fila">
      <button class="btn-cancel" onclick="cerrarMiniModal()">Cancelar</button>
      <button class="btn-guardar" onclick="guardarNuevoPaciente()">✓ Guardar y seleccionar</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://terlbqrcampdqtxjbihg.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlcmxicXJjYW1wZHF0eGpiaWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzU2NzksImV4cCI6MjA4ODE1MTY3OX0.c0Yhp4Q8Egs1UzWhtFLxQpJfEUi3nsR8t78tNYliZE8';

  const DIAS_NOMBRES = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const COLORES_TIPO = {
    'Sesión': '#27ae60', 'Evaluación': '#3498db', 'Pericia': '#8e44ad',
    'Evento': '#f39c12', 'Otro': '#6c757d'
  };

  let userId = null;
  let token = null;
  let semanaOffset = 0;
  let diaSeleccionado = null;
  let turnosCache = {};
  let colorSeleccionado = '#27ae60';
  let editandoId = null;
  let pacientesList = [];

  // ── INIT ──
  async function init() {
    token = localStorage.getItem('sb-access-token');
    if (!token) { location.href = 'login.html'; return; }

    const uRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if (!uRes.ok) { location.href = 'login.html'; return; }
    const user = await uRes.json();
    userId = user.id;

    const hoy = new Date();
    diaSeleccionado = hoy.toISOString().split('T')[0];
    document.getElementById('input-fecha').value = diaSeleccionado;

    await cargarPacientes();
    renderSemana();
    await cargarTurnosSemana();
    renderDias();
    renderContenido();
  }

  // ── SEMANA ──
  function getLunes() {
    const hoy = new Date();
    hoy.setDate(hoy.getDate() + semanaOffset * 7);
    const d = hoy.getDay();
    const diff = d === 0 ? -6 : 1 - d;
    hoy.setDate(hoy.getDate() + diff);
    hoy.setHours(0,0,0,0);
    return hoy;
  }

  function renderSemana() {
    const lunes = getLunes();
    const sabado = new Date(lunes);
    sabado.setDate(lunes.getDate() + 5);
    const esSemanaActual = semanaOffset === 0;
    if (esSemanaActual) {
      document.getElementById('semana-label').textContent = 'Esta semana';
    } else {
      document.getElementById('semana-label').textContent =
        `${lunes.getDate()} ${MESES[lunes.getMonth()]} – ${sabado.getDate()} ${MESES[sabado.getMonth()]}`;
    }
  }

  async function cambiarSemana(dir) {
    semanaOffset += dir;
    renderSemana();
    turnosCache = {};
    await cargarTurnosSemana();
    renderDias();
    // Seleccionar primer día de la semana si el actual ya no está en la semana
    const lunes = getLunes();
    const nuevoSeleccionado = new Date(lunes);
    nuevoSeleccionado.setDate(lunes.getDate() + (diaSeleccionado ? 0 : 0));
    // Mantener el mismo día de la semana si es posible
    const diasSemana = [];
    for (let i = 0; i < 6; i++) {
      const d = new Date(lunes);
      d.setDate(lunes.getDate() + i);
      diasSemana.push(d.toISOString().split('T')[0]);
    }
    if (!diasSemana.includes(diaSeleccionado)) {
      diaSeleccionado = diasSemana[0];
    }
    renderDias();
    renderContenido();
  }

  async function cargarTurnosSemana() {
    const lunes = getLunes();
    const sabado = new Date(lunes);
    sabado.setDate(lunes.getDate() + 5);
    const lunesStr = lunes.toISOString().split('T')[0];
    const sabadoStr = sabado.toISOString().split('T')[0];

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/turnos?user_id=eq.${userId}&fecha=gte.${lunesStr}&fecha=lte.${sabadoStr}&order=hora.asc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` } }
    );
    if (!res.ok) return;
    const turnos = await res.json();
    turnosCache = {};
    turnos.forEach(t => {
      if (!turnosCache[t.fecha]) turnosCache[t.fecha] = [];
      turnosCache[t.fecha].push(t);
    });
  }

  function renderDias() {
    const lunes = getLunes();
    const hoyStr = new Date().toISOString().split('T')[0];
    const cont = document.getElementById('dias-scroll');
    cont.innerHTML = '';

    for (let i = 0; i < 6; i++) {
      const d = new Date(lunes);
      d.setDate(lunes.getDate() + i);
      const dStr = d.toISOString().split('T')[0];
      const esHoy = dStr === hoyStr;
      const esSeleccionado = dStr === diaSeleccionado;
      const tieneTurnos = turnosCache[dStr] && turnosCache[dStr].length > 0;

      const chip = document.createElement('button');
      chip.className = `dia-chip${esHoy ? ' hoy' : ''}${esSeleccionado ? ' seleccionado' : ''}${tieneTurnos ? ' tiene-turnos' : ''}`;
      chip.innerHTML = `
        <span class="dia-nombre">${DIAS_NOMBRES[d.getDay()]}</span>
        <span class="dia-num">${d.getDate()}</span>
        <span class="dia-punto"></span>`;
      chip.onclick = () => seleccionarDia(dStr);
      cont.appendChild(chip);
    }

    // Auto-scroll al día seleccionado
    const chips = cont.querySelectorAll('.dia-chip');
    const idx = Array.from(chips).findIndex(c => c.classList.contains('seleccionado'));
    if (idx >= 0) chips[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function seleccionarDia(fecha) {
    diaSeleccionado = fecha;
    renderDias();
    renderContenido();
  }

  function renderContenido() {
    const cont = document.getElementById('contenido');
    const d = new Date(diaSeleccionado + 'T12:00:00');
    const titulo = `${DIAS_NOMBRES[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}`;
    const turnos = turnosCache[diaSeleccionado] || [];

    if (turnos.length === 0) {
      cont.innerHTML = `
        <div class="dia-titulo">${titulo}</div>
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div class="empty-txt">No hay turnos este día</div>
          <button class="empty-btn" onclick="abrirModalNuevo()">+ Agendar turno</button>
        </div>`;
      return;
    }

    cont.innerHTML = `<div class="dia-titulo">${titulo}</div>` +
      turnos.map(t => {
        const color = t.color || COLORES_TIPO[t.tipo] || '#27ae60';
        const borde = getBordeClass(color);
        const hora = (t.hora || '').substring(0, 5);
        const dur = t.duracion ? `${t.duracion} min` : '';
        const estCls = getEstadoClass(t.estado);
        return `
          <div class="turno-card" onclick="abrirDetalle('${t.id}')">
            <div class="turno-borde ${borde}" style="background:${color}"></div>
            <div class="turno-hora-wrap">
              <div class="turno-hora">${hora}</div>
              <div class="turno-dur">${dur}</div>
            </div>
            <div class="turno-info">
              <div class="turno-paciente">${t.paciente_nombre || t.descripcion || 'Sin paciente'}</div>
              <div class="turno-tipo">${t.tipo || 'Sesión'}</div>
            </div>
            <div class="turno-actions">
              <span class="badge-estado ${estCls}">${capitalizar(t.estado || 'pendiente')}</span>
            </div>
          </div>`;
      }).join('');
  }

  function getBordeClass(color) {
    if (!color) return 'borde-verde';
    if (color === '#27ae60' || color === '#2ecc71') return 'borde-verde';
    if (color === '#f39c12' || color === '#f8b739') return 'borde-naranja';
    if (color === '#3498db') return 'borde-azul';
    if (color === '#8e44ad') return 'borde-violeta';
    if (color === '#e74c3c') return 'borde-rojo';
    return 'borde-verde';
  }

  function getEstadoClass(e) {
    if (!e) return 'est-pendiente';
    if (e === 'realizado' || e === 'realizada') return 'est-realizado';
    if (e === 'cancelado' || e === 'cancelada') return 'est-cancelado';
    return 'est-pendiente';
  }

  function capitalizar(s) { return s ? s[0].toUpperCase() + s.slice(1) : ''; }

  // ── MODAL NUEVO TURNO ──
  function abrirModalNuevo() {
    editandoId = null;
    document.getElementById('modal-titulo-txt').textContent = 'Nuevo turno';
    document.getElementById('input-paciente').value = '';
    document.getElementById('input-tipo').value = 'Sesión';
    document.getElementById('input-fecha').value = diaSeleccionado;
    document.getElementById('input-hora').value = '09:00';
    document.getElementById('input-duracion').value = '45';
    document.getElementById('input-notas').value = '';
    document.getElementById('input-whatsapp').checked = false;
    colorSeleccionado = '#27ae60';
    document.querySelectorAll('.color-opcion').forEach(c => c.classList.remove('activo'));
    document.querySelector('[data-color="#27ae60"]').classList.add('activo');
    document.getElementById('modal-turno').classList.add('open');
  }

  function cerrarModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  function seleccionarColor(el) {
    document.querySelectorAll('.color-opcion').forEach(c => c.classList.remove('activo'));
    el.classList.add('activo');
    colorSeleccionado = el.dataset.color;
  }

  function actualizarColorPorTipo() {
    const tipo = document.getElementById('input-tipo').value;
    const color = COLORES_TIPO[tipo] || '#27ae60';
    colorSeleccionado = color;
    document.querySelectorAll('.color-opcion').forEach(c => {
      c.classList.toggle('activo', c.dataset.color === color);
    });
  }

  async function guardarTurno() {
    const pacienteSelect = document.getElementById('input-paciente');
    const pacienteId = pacienteSelect.value;
    const pacienteNombre = pacienteSelect.options[pacienteSelect.selectedIndex]?.text || '';
    const fecha = document.getElementById('input-fecha').value;
    const hora = document.getElementById('input-hora').value;
    const tipo = document.getElementById('input-tipo').value;
    const duracion = document.getElementById('input-duracion').value;
    const notas = document.getElementById('input-notas').value;
    const enviarWA = document.getElementById('input-whatsapp').checked;

    if (!fecha || !hora) { alert('Completá fecha y hora'); return; }

    const payload = {
      user_id: userId,
      paciente_id: pacienteId || null,
      paciente_nombre: pacienteNombre !== 'Seleccioná un paciente' ? pacienteNombre : '',
      fecha, hora, tipo,
      duracion: parseInt(duracion),
      notas, color: colorSeleccionado,
      estado: 'pendiente'
    };

    let res;
    if (editandoId) {
      res = await fetch(`${SUPABASE_URL}/rest/v1/turnos?id=eq.${editandoId}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
    } else {
      res = await fetch(`${SUPABASE_URL}/rest/v1/turnos`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
        body: JSON.stringify(payload)
      });
    }

    if (!res.ok) { alert('Error al guardar'); return; }

    if (enviarWA && pacienteId) {
      await enviarWhatsApp(pacienteId, pacienteNombre, fecha, hora, tipo);
    }

    cerrarModal('modal-turno');
    turnosCache = {};
    await cargarTurnosSemana();
    renderDias();
    renderContenido();
  }

  async function enviarWhatsApp(pacId, nombre, fecha, hora, tipo) {
    try {
      const pacRes = await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${pacId}&select=telefono`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
      });
      const pacs = await pacRes.json();
      if (!pacs.length || !pacs[0].telefono) return;
      const tel = pacs[0].telefono.replace(/\D/g, '');
      const d = new Date(fecha + 'T12:00:00');
      const msg = `Hola ${nombre}! Te recordamos tu ${tipo} el ${DIAS_NOMBRES[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]} a las ${hora}hs. 🟢 PsicoApp`;
      await fetch(`${SUPABASE_URL}/functions/v1/enviar-whatsapp`, {
        method: 'POST',
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: tel, body: msg })
      });
    } catch(e) { console.error('WA error:', e); }
  }

  // ── DETALLE TURNO ──
  async function abrirDetalle(turnoId) {
    let turno = null;
    Object.values(turnosCache).forEach(arr => {
      const found = arr.find(t => t.id === turnoId);
      if (found) turno = found;
    });
    if (!turno) return;

    const color = turno.color || COLORES_TIPO[turno.tipo] || '#27ae60';
    const d = new Date(turno.fecha + 'T12:00:00');

    document.getElementById('detalle-contenido').innerHTML = `
      <div style="border-left:4px solid ${color};padding-left:14px;margin-bottom:16px">
        <div style="font-size:20px;font-weight:800;color:#2d3748">${turno.paciente_nombre || turno.descripcion || 'Sin paciente'}</div>
        <div style="font-size:13px;color:#6c757d;margin-top:4px">${turno.tipo || 'Sesión'}</div>
        <div style="font-size:14px;color:#2d3748;margin-top:8px">
          📅 ${DIAS_NOMBRES[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]}<br>
          🕐 ${(turno.hora || '').substring(0,5)} · ${turno.duracion || 45} min
        </div>
        ${turno.notas ? `<div style="margin-top:8px;font-size:13px;color:#6c757d">💬 ${turno.notas}</div>` : ''}
        <div style="margin-top:8px">
          <span class="badge-estado ${getEstadoClass(turno.estado)}">${capitalizar(turno.estado || 'pendiente')}</span>
        </div>
      </div>`;

    const acciones = document.getElementById('detalle-acciones');
    const esRealizado = turno.estado === 'realizado' || turno.estado === 'realizada';
    const esCancelado = turno.estado === 'cancelado' || turno.estado === 'cancelada';

    acciones.innerHTML = '';

    if (!esRealizado && !esCancelado) {
      addBtn(acciones, '✓ Marcar realizada', 'btn-accion btn-realizado', () => cambiarEstado(turnoId, 'realizado'));
      addBtn(acciones, '✕ Cancelar turno', 'btn-accion btn-cancelar-turno', () => cambiarEstado(turnoId, 'cancelado'));
    }
    addBtn(acciones, '✏️ Editar', 'btn-accion btn-editar', () => { cerrarModal('modal-detalle'); abrirEditar(turno); });
    if (turno.paciente_id) {
      addBtn(acciones, '💬 WhatsApp', 'btn-accion btn-whatsapp', () => abrirWhatsApp(turno));
    }
    addBtn(acciones, '🗑 Eliminar', 'btn-accion btn-eliminar', () => eliminarTurno(turnoId));

    document.getElementById('modal-detalle').classList.add('open');
  }

  function addBtn(cont, txt, cls, fn) {
    const b = document.createElement('button');
    b.className = cls;
    b.textContent = txt;
    b.onclick = fn;
    cont.appendChild(b);
  }

  async function cambiarEstado(id, estado) {
    const payload = { estado };
    if (estado === 'realizado') {
      payload.estado = 'realizado';
      await crearPagoAutomatico(id);
    }
    await fetch(`${SUPABASE_URL}/rest/v1/turnos?id=eq.${id}`, {
      method: 'PATCH',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    cerrarModal('modal-detalle');
    turnosCache = {};
    await cargarTurnosSemana();
    renderDias();
    renderContenido();
  }

  async function crearPagoAutomatico(turnoId) {
    // Verificar si ya existe pago para este turno
    const checkRes = await fetch(`${SUPABASE_URL}/rest/v1/pagos?turno_id=eq.${turnoId}&select=id`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    if (checkRes.ok) {
      const existing = await checkRes.json();
      if (existing.length > 0) return;
    }

    // Obtener valor sesión del perfil
    const perfRes = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=valor_sesion`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    let monto = 0;
    if (perfRes.ok) {
      const perfs = await perfRes.json();
      if (perfs.length > 0) monto = perfs[0].valor_sesion || 0;
    }

    // Obtener datos del turno
    let turno = null;
    Object.values(turnosCache).forEach(arr => {
      const found = arr.find(t => t.id === turnoId);
      if (found) turno = found;
    });

    await fetch(`${SUPABASE_URL}/rest/v1/pagos`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id: userId,
        paciente_id: turno?.paciente_id || null,
        paciente_nombre: turno?.paciente_nombre || '',
        monto, estado: 'pendiente',
        metodo: 'pendiente',
        fecha: new Date().toISOString().split('T')[0],
        concepto: 'Sesión',
        turno_id: turnoId
      })
    });
  }

  async function eliminarTurno(id) {
    if (!confirm('¿Eliminar este turno?')) return;
    await fetch(`${SUPABASE_URL}/rest/v1/turnos?id=eq.${id}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    cerrarModal('modal-detalle');
    turnosCache = {};
    await cargarTurnosSemana();
    renderDias();
    renderContenido();
  }

  function abrirEditar(turno) {
    editandoId = turno.id;
    document.getElementById('modal-titulo-txt').textContent = 'Editar turno';
    document.getElementById('input-paciente').value = turno.paciente_id || '';
    document.getElementById('input-tipo').value = turno.tipo || 'Sesión';
    document.getElementById('input-fecha').value = turno.fecha;
    document.getElementById('input-hora').value = (turno.hora || '').substring(0, 5);
    document.getElementById('input-duracion').value = turno.duracion || 45;
    document.getElementById('input-notas').value = turno.notas || '';
    colorSeleccionado = turno.color || '#27ae60';
    document.querySelectorAll('.color-opcion').forEach(c => {
      c.classList.toggle('activo', c.dataset.color === colorSeleccionado);
    });
    document.getElementById('modal-turno').classList.add('open');
  }

  async function abrirWhatsApp(turno) {
    const pacId = turno.paciente_id;
    if (!pacId) return;
    const res = await fetch(`${SUPABASE_URL}/rest/v1/pacientes?id=eq.${pacId}&select=telefono`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` }
    });
    const pacs = await res.json();
    if (!pacs.length || !pacs[0].telefono) { alert('El paciente no tiene teléfono registrado'); return; }
    const tel = pacs[0].telefono.replace(/\D/g, '');
    const d = new Date(turno.fecha + 'T12:00:00');
    const msg = encodeURIComponent(`Hola ${turno.paciente_nombre}! Te recordamos tu ${turno.tipo || 'sesión'} el ${DIAS_NOMBRES[d.getDay()]} ${d.getDate()} de ${MESES[d.getMonth()]} a las ${(turno.hora||'').substring(0,5)}hs.`);
    window.open(`https://wa.me/${tel}?text=${msg}`, '_blank');
    cerrarModal('modal-detalle');
  }

  // ── PACIENTES ──
  async function cargarPacientes() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/pacientes?user_id=eq.${userId}&activo=eq.true&order=apellido.asc&select=id,nombre,apellido`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}` } }
    );
    if (!res.ok) return;
    pacientesList = await res.json();
    actualizarSelectPacientes();
  }

  function actualizarSelectPacientes() {
    const sel = document.getElementById('input-paciente');
    sel.innerHTML = '<option value="">Seleccioná un paciente</option>' +
      pacientesList.map(p => `<option value="${p.id}">${p.apellido || ''} ${p.nombre || ''}</option>`).join('');
  }

  // ── MINI MODAL NUEVO PACIENTE ──
  function abrirMiniModal() {
    document.getElementById('mini-nombre').value = '';
    document.getElementById('mini-apellido').value = '';
    document.getElementById('mini-telefono').value = '';
    document.getElementById('mini-modal').classList.add('open');
  }

  function cerrarMiniModal() {
    document.getElementById('mini-modal').classList.remove('open');
  }

  async function guardarNuevoPaciente() {
    const nombre = document.getElementById('mini-nombre').value.trim();
    const apellido = document.getElementById('mini-apellido').value.trim();
    const telefono = document.getElementById('mini-telefono').value.trim();
    if (!nombre && !apellido) { alert('Ingresá al menos nombre o apellido'); return; }

    const res = await fetch(`${SUPABASE_URL}/rest/v1/pacientes`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ user_id: userId, nombre, apellido, telefono, activo: true })
    });
    if (!res.ok) { alert('Error al guardar paciente'); return; }
    const nuevos = await res.json();
    const nuevo = nuevos[0];
    pacientesList.push(nuevo);
    pacientesList.sort((a, b) => (a.apellido || '').localeCompare(b.apellido || ''));
    actualizarSelectPacientes();
    document.getElementById('input-paciente').value = nuevo.id;
    cerrarMiniModal();
  }

  // ── DRAWER ──
  function abrirDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');
  }
  function cerrarDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  init();
</script>
</body>
</html>
