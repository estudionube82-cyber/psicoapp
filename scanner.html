<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Scanner — Pérez Aré</title>
<meta name="theme-color" content="#0F172A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0F172A;
  --surface:#1E293B;
  --surface2:#334155;
  --accent:#38BDF8;
  --accent2:#818CF8;
  --green:#34D399;
  --red:#F87171;
  --text:#F1F5F9;
  --muted:#94A3B8;
  --border:#334155;
  --r:16px;
}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'DM Sans',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  max-width:430px;
  margin:0 auto;
  height:100dvh;
  position:relative;
}

/* HEADER */
.header{
  padding:52px 20px 14px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.header-brand{
  display:flex;
  align-items:center;
  gap:10px;
}
.header-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
  box-shadow:0 4px 16px rgba(56,189,248,0.3);
}
.header-title{
  font-family:'Syne',sans-serif;
  font-size:1.3rem;
  font-weight:800;
  color:var(--text);
  letter-spacing:-.02em;
}
.header-sub{font-size:.75rem;color:var(--muted);margin-top:1px;}
.btn-drive{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:7px 12px;
  font-size:.75rem;font-weight:700;
  color:var(--muted);
  cursor:pointer;
  border:none;
  transition:all .2s;
}
.btn-drive.connected{color:var(--green);border-color:var(--green);}
.btn-drive svg{width:16px;height:16px;}

/* PREVIEW AREA */
.preview-area{
  flex:1;
  padding:0 16px;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.preview-area::-webkit-scrollbar{display:none;}

.empty-state{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  color:var(--muted);
  text-align:center;
  padding:20px;
}
.empty-icon{
  width:80px;height:80px;
  background:var(--surface);
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:36px;
  border:2px dashed var(--border);
}
.empty-title{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text);}
.empty-sub{font-size:.85rem;line-height:1.5;}

/* PAGES GRID */
.pages-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding-bottom:16px;
}
.page-item{
  position:relative;
  border-radius:12px;
  overflow:hidden;
  aspect-ratio:3/4;
  background:var(--surface);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.page-item img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
.page-num{
  position:absolute;
  top:8px;left:8px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);
  color:#fff;
  font-size:11px;font-weight:700;
  padding:3px 8px;
  border-radius:6px;
}
.page-del{
  position:absolute;
  top:8px;right:8px;
  width:28px;height:28px;
  background:rgba(248,113,113,0.9);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  font-size:14px;
  color:#fff;
}

/* PROGRESS BAR */
.progress-bar{
  height:3px;
  background:var(--surface2);
  border-radius:2px;
  margin:0 16px 12px;
  overflow:hidden;
  display:none;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  transition:width .3s ease;
  width:0%;
}

/* STATUS */
.status-bar{
  padding:0 16px 8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-shrink:0;
}
.page-count{
  font-size:.8rem;font-weight:700;
  color:var(--muted);
}
.page-count span{color:var(--accent);font-size:1rem;}
.btn-clear{
  font-size:.75rem;font-weight:700;
  color:var(--red);
  background:none;border:none;cursor:pointer;
  padding:4px 8px;
}

/* BOTTOM ACTIONS */
.actions{
  padding:12px 16px 32px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex-shrink:0;
  background:linear-gradient(to top,var(--bg) 80%,transparent);
}
.btn-capture{
  width:100%;
  padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#0F172A;
  border:none;border-radius:var(--r);
  font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 4px 20px rgba(56,189,248,0.35);
  transition:all .15s;
  letter-spacing:-.01em;
}
.btn-capture:active{transform:scale(.98);opacity:.9;}
.btn-capture svg{width:22px;height:22px;}

.btn-row{display:flex;gap:10px;}
.btn-secondary{
  flex:1;
  padding:13px;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:.875rem;font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .15s;
}
.btn-secondary:active{transform:scale(.98);}
.btn-secondary.btn-pdf{border-color:var(--green);color:var(--green);}
.btn-secondary.btn-upload{border-color:var(--accent2);color:var(--accent2);}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed;}

/* TOAST */
.toast{
  position:fixed;
  bottom:140px;
  left:50%;transform:translateX(-50%);
  background:#1E293B;
  border:1px solid var(--border);
  color:var(--text);
  padding:12px 20px;
  border-radius:12px;
  font-size:.875rem;font-weight:600;
  z-index:999;
  opacity:0;
  transition:opacity .3s;
  white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
  pointer-events:none;
}
.toast.show{opacity:1;}

/* INPUT FILE HIDDEN */
#fileInput{display:none;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-brand">
    <div class="header-icon">📄</div>
    <div>
      <div class="header-title">Scanner</div>
      <div class="header-sub">Pérez Aré · Estudio</div>
    </div>
  </div>
  <button class="btn-drive" id="btnDrive" onclick="conectarDrive()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </svg>
    <span id="driveLabel">Drive</span>
  </button>
</div>

<!-- STATUS -->
<div class="status-bar" id="statusBar" style="display:none">
  <div class="page-count"><span id="pageCount">0</span> página(s)</div>
  <button class="btn-clear" onclick="limpiarTodo()">✕ Limpiar todo</button>
</div>

<!-- PROGRESS -->
<div class="progress-bar" id="progressBar">
  <div class="progress-fill" id="progressFill"></div>
</div>

<!-- PREVIEW -->
<div class="preview-area" id="previewArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">📷</div>
    <div class="empty-title">Sin páginas</div>
    <div class="empty-sub">Tocá el botón de abajo para capturar una página con la cámara o seleccionar desde galería.</div>
  </div>
  <div class="pages-grid" id="pagesGrid" style="display:none"></div>
</div>

<!-- ACTIONS -->
<div class="actions">
  <button class="btn-capture" onclick="capturar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
    Capturar página
  </button>
  <div class="btn-row">
    <button class="btn-secondary btn-pdf" id="btnPDF" onclick="generarPDF()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      Guardar PDF
    </button>
    <button class="btn-secondary btn-upload" id="btnUpload" onclick="subirDrive()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      Subir a Drive
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" capture="environment" multiple onchange="procesarFotos(event)"/>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const GCAL_CLIENT_ID = '258644442158-gid3k8d4ga7a9lem9e4tjl4aif33gsu1.apps.googleusercontent.com';
const DRIVE_SCOPES   = 'https://www.googleapis.com/auth/drive.file';

let paginas = [];       // { dataUrl, blob }
let driveToken = null;
let pdfBlob = null;

// ── TOAST ──
function toast(msg, ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── CAPTURAR ──
function capturar() {
  document.getElementById('fileInput').click();
}

async function procesarFotos(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  for (const file of files) {
    const dataUrl = await fileToDataUrl(file);
    paginas.push({ dataUrl, file });
  }

  e.target.value = '';
  renderPaginas();
  actualizarBotones();
  toast(`✅ ${files.length > 1 ? files.length + ' páginas agregadas' : 'Página agregada'}`);
}

function fileToDataUrl(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(file);
  });
}

// ── RENDER ──
function renderPaginas() {
  const grid  = document.getElementById('pagesGrid');
  const empty = document.getElementById('emptyState');
  const sb    = document.getElementById('statusBar');
  const count = document.getElementById('pageCount');

  if (!paginas.length) {
    grid.style.display  = 'none';
    empty.style.display = 'flex';
    sb.style.display    = 'none';
    return;
  }

  empty.style.display = 'none';
  grid.style.display  = 'grid';
  sb.style.display    = 'flex';
  count.textContent   = paginas.length;

  grid.innerHTML = paginas.map((p, i) => `
    <div class="page-item">
      <img src="${p.dataUrl}" alt="Página ${i+1}"/>
      <div class="page-num">${i+1}</div>
      <button class="page-del" onclick="eliminarPagina(${i})">✕</button>
    </div>
  `).join('');
}

function eliminarPagina(i) {
  paginas.splice(i, 1);
  pdfBlob = null;
  renderPaginas();
  actualizarBotones();
}

function limpiarTodo() {
  if (!confirm('¿Eliminar todas las páginas?')) return;
  paginas = [];
  pdfBlob = null;
  renderPaginas();
  actualizarBotones();
}

function actualizarBotones() {
  const tiene = paginas.length > 0;
  document.getElementById('btnPDF').disabled    = !tiene;
  document.getElementById('btnUpload').disabled = !tiene || !driveToken;
}

// ── GENERAR PDF ──
async function generarPDF() {
  if (!paginas.length) return;
  toast('Generando PDF...', 60000);
  mostrarProgreso(true);

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    for (let i = 0; i < paginas.length; i++) {
      setProgreso((i / paginas.length) * 100);
      if (i > 0) pdf.addPage();

      const img   = await cargarImagen(paginas[i].dataUrl);
      const ratio = img.width / img.height;
      const pw    = 210, ph = 297;
      let w = pw, h = pw / ratio;
      if (h > ph) { h = ph; w = ph * ratio; }
      const x = (pw - w) / 2;
      const y = (ph - h) / 2;

      pdf.addImage(paginas[i].dataUrl, 'JPEG', x, y, w, h, '', 'FAST');
    }

    setProgreso(100);
    pdfBlob = pdf.output('blob');

    // Descargar
    const nombre = `scan_${formatFecha()}.pdf`;
    const url = URL.createObjectURL(pdfBlob);
    const a = document.createElement('a');
    a.href = url; a.download = nombre;
    a.click();
    URL.revokeObjectURL(url);

    toast('✅ PDF guardado');
    if (driveToken) document.getElementById('btnUpload').disabled = false;
  } catch(e) {
    toast('Error al generar PDF');
    console.error(e);
  } finally {
    mostrarProgreso(false);
    setProgreso(0);
  }
}

function cargarImagen(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

// ── GOOGLE DRIVE ──
function initGoogleDrive() {
  gapi.load('client:auth2', async () => {
    await gapi.client.init({
      clientId: GCAL_CLIENT_ID,
      scope: DRIVE_SCOPES,
    });
    const auth = gapi.auth2.getAuthInstance();
    if (auth.isSignedIn.get()) {
      driveToken = auth.currentUser.get().getAuthResponse().access_token;
      actualizarEstadoDrive(true);
    }
    auth.isSignedIn.listen(signed => {
      if (signed) {
        driveToken = auth.currentUser.get().getAuthResponse().access_token;
        actualizarEstadoDrive(true);
      } else {
        driveToken = null;
        actualizarEstadoDrive(false);
      }
    });
  });
}

function actualizarEstadoDrive(conectado) {
  const btn = document.getElementById('btnDrive');
  const lbl = document.getElementById('driveLabel');
  if (conectado) {
    btn.classList.add('connected');
    lbl.textContent = '✓ Drive';
  } else {
    btn.classList.remove('connected');
    lbl.textContent = 'Drive';
  }
  actualizarBotones();
}

async function conectarDrive() {
  if (!window.gapi?.auth2) { toast('Cargando...'); setTimeout(conectarDrive, 1500); return; }
  const auth = gapi.auth2.getAuthInstance();
  if (auth.isSignedIn.get()) {
    if (confirm('¿Desconectar Google Drive?')) await auth.signOut();
  } else {
    try { await auth.signIn(); toast('✅ Drive conectado'); }
    catch(e) { toast('Error al conectar Drive'); }
  }
}

async function subirDrive() {
  if (!driveToken) { toast('Conectá Drive primero'); return; }
  if (!pdfBlob) {
    toast('Generá el PDF primero');
    return;
  }

  toast('Subiendo a Drive...', 60000);
  mostrarProgreso(true);

  try {
    const nombre = `scan_${formatFecha()}.pdf`;
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({
      name: nombre,
      mimeType: 'application/pdf',
    })], { type: 'application/json' }));
    form.append('file', pdfBlob, nombre);

    const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${driveToken}` },
      body: form,
    });

    if (!res.ok) throw new Error(await res.text());
    setProgreso(100);
    toast('✅ PDF subido a Google Drive');
  } catch(e) {
    toast('Error al subir a Drive');
    console.error(e);
  } finally {
    mostrarProgreso(false);
    setProgreso(0);
  }
}

// ── HELPERS ──
function mostrarProgreso(show) {
  document.getElementById('progressBar').style.display = show ? 'block' : 'none';
}
function setProgreso(pct) {
  document.getElementById('progressFill').style.width = pct + '%';
}
function formatFecha() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}_${String(d.getHours()).padStart(2,'0')}${String(d.getMinutes()).padStart(2,'0')}`;
}

function gapiLoaded() { initGoogleDrive(); }
</script>
<script src="https://apis.google.com/js/api.js?onload=gapiLoaded"></script>
</body>
</html>
