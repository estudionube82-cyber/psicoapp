<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PsicoApp — Ingresar</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #F4A261;
      --orange-d:#E76F51;
      --green:   #2D6A4F;
      --green-l: #40916C;
      --bg:      #FDF8F3;
      --card:    #FFFFFF;
      --text:    #1A2E24;
      --muted:   #8A8FA8;
      --border:  #E8E4DD;
      --err:     #B94A48;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* Fondo degradado con círculos decorativos */
    body::before {
      content: '';
      position: fixed;
      top: -150px; right: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(244,162,97,0.2) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(45,106,79,0.15) 0%, transparent 70%);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 2.8rem 2.5rem 2.5rem;
      width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 4px 16px rgba(244,162,97,0.1);
    }

    .logo {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 1.8rem;
      text-align: center;
    }
    .logo-icon {
      width: 100px; height: 100px;
      flex-shrink: 0;
      overflow: visible;
      margin-bottom: 10px;
    }
    .logo-icon img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 6px 16px rgba(244,162,97,0.45)); }
    .logo-text {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      color: #1A2E24;
      letter-spacing: -.01em;
      line-height: 1;
    }
    .logo-text span { color: #F4A261; }
    .logo-tagline {
      font-size: 11px;
      color: #8A8FA8;
      font-weight: 600;
      margin-top: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.7rem;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: .4rem;
    }
    .subtitle {
      font-size: .9rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* tabs */
    .tabs {
      display: flex;
      background: #F4F1ED;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 1.8rem;
      gap: 4px;
    }
    .tab {
      flex: 1; padding: .55rem;
      border: none; background: transparent;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .875rem; font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .tab.active {
      background: var(--card);
      color: var(--green);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* form */
    .field { margin-bottom: 1.1rem; }
    label {
      display: block;
      font-size: .78rem; font-weight: 700;
      color: var(--muted);
      letter-spacing: .05em; text-transform: uppercase;
      margin-bottom: .45rem;
    }
    input {
      width: 100%;
      padding: .75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      color: var(--text);
      background: #FAFAF8;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(244,162,97,0.15);
      background: #fff;
    }
    input::placeholder { color: #C5C0B8; }

    .btn {
      width: 100%; padding: .85rem;
      border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      margin-top: .3rem;
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--green) 0%, var(--green-l) 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(45,106,79,0.3);
    }
    .btn-primary:hover { 
      box-shadow: 0 6px 20px rgba(45,106,79,0.4);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* message */
    .msg {
      padding: .65rem .9rem;
      border-radius: 10px;
      font-size: .875rem;
      margin-bottom: 1rem;
      display: none;
      font-weight: 500;
    }
    .msg.error   { background: #fdf0ef; color: var(--err); border: 1px solid #f0c8c7; }
    .msg.success { background: #EDFBF3; color: var(--green); border: 1px solid #B7DFC8; }

    .divider {
      text-align: center;
      font-size: .78rem;
      color: var(--border);
      margin: 1.5rem 0 0;
    }
  </style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2D6A4F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>

<div class="card">

  <div class="logo">
    <div class="logo-icon">
      <img src="/logo-psicoapp.png" alt="PsicoApp">
    </div>
    <span class="logo-text">Psico<span>App</span></span>
    <span class="logo-tagline">Gestión para psicólogos</span>
  </div>

  <h1 style="text-align:center">Bienvenido</h1>
  <p class="subtitle" style="text-align:center">Tu consultorio, siempre organizado.</p>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Ingresar</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">Registrarse</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label>Email</label>
      <input id="login-email" type="email" placeholder="tu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">
      <span class="spinner" id="spin-login"></span>
      <span id="lbl-login">Ingresar</span>
    </button>
  </div>

  <!-- REGISTER -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Email</label>
      <input id="reg-email" type="email" placeholder="tu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input id="reg-pass" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <button class="btn btn-primary" id="btn-reg" onclick="doRegister()">
      <span class="spinner" id="spin-reg"></span>
      <span id="lbl-reg">Crear cuenta</span>
    </button>
  </div>

  <p class="divider">PsicoApp © 2025</p>
</div>

<script>
  const SUPA_URL = 'https://terlbqrcampdqtxjbihg.supabase.co';
  const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlcmxicXJjYW1wZHF0eGpiaWhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzU2NzksImV4cCI6MjA4ODE1MTY3OX0.c0Yhp4Q8Egs1UzWhtFLxQpJfEUi3nsR8t78tNYliZE8';
  const { createClient } = supabase;
  const sb = createClient(SUPA_URL, SUPA_KEY);

  // redirect if already logged in
  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'psicoapp-index.html';
  });

  function switchTab(t) {
    const isLogin = t === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display    = isLogin ? '' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none' : '';
    hideMsg();
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = 'block';
  }
  function hideMsg() {
    const el = document.getElementById('msg');
    el.style.display = 'none';
  }

  function setLoading(btnId, spinId, lblId, loading, label) {
    document.getElementById(btnId).disabled = loading;
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
    document.getElementById(lblId).textContent = loading ? '' : label;
  }

  async function doLogin() {
    hideMsg();
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { showMsg('Completá email y contraseña.', 'error'); return; }

    setLoading('btn-login','spin-login','lbl-login', true, 'Ingresar');
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    setLoading('btn-login','spin-login','lbl-login', false, 'Ingresar');

    if (error) { showMsg(translateError(error.message), 'error'); return; }
    window.location.href = 'psicoapp-index.html';
  }

  async function doRegister() {
    hideMsg();
    const email = document.getElementById('reg-email').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    if (!email || !pass) { showMsg('Completá todos los campos.', 'error'); return; }
    if (pass.length < 6)  { showMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }

    setLoading('btn-reg','spin-reg','lbl-reg', true, 'Crear cuenta');
    const { error } = await sb.auth.signUp({ email, password: pass });
    setLoading('btn-reg','spin-reg','lbl-reg', false, 'Crear cuenta');

    if (error) { showMsg(translateError(error.message), 'error'); return; }
    showMsg('¡Cuenta creada! Revisá tu email para confirmar, luego ingresá.', 'success');
    switchTab('login');
  }

  // allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginVisible = document.getElementById('form-login').style.display !== 'none';
    if (loginVisible) doLogin(); else doRegister();
  });

  function translateError(msg) {
    if (msg.includes('Invalid login'))      return 'Email o contraseña incorrectos.';
    if (msg.includes('Email not confirmed')) return 'Confirmá tu email antes de ingresar.';
    if (msg.includes('already registered')) return 'Este email ya está registrado. Ingresá en lugar de registrarte.';
    if (msg.includes('Password should'))    return 'La contraseña debe tener al menos 6 caracteres.';
    return msg;
  }
</script>
</body>
</html>
